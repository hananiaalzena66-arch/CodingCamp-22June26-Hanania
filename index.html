<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <div class="app-header">
      <h1 class="app-title">Expense &amp; Budget Visualizer</h1>
      <button class="btn-theme" id="themeToggle" title="Toggle dark/light mode">🌙</button>
    </div>

    <!-- Balance Card -->
    <div class="balance-card">
      <div class="balance-label">TOTAL BALANCE</div>
      <div class="balance-amount" id="balanceAmount">$0.00</div>
    </div>

    <!-- Add Transaction Form -->
    <div class="card">
      <div class="card-title">Add Transaction</div>

      <div class="field">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Lunch, Uber, Netflix…" autocomplete="off" />
      </div>

      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" />
      </div>

      <div class="field">
        <label for="catSelect">Category</label>
        <select id="catSelect"></select>
      </div>

      <!-- Spending Limit -->
      <div class="limit-row">
        <input type="checkbox" id="limitEnabled" />
        <label for="limitEnabled">Highlight over limit</label>
        <div class="limit-input-wrap" id="limitInputWrap">
          <span>Limit $</span>
          <input type="number" id="limitField" class="limit-field" placeholder="e.g. 100" min="1" />
        </div>
      </div>

      <div class="form-error" id="formError"></div>
      <button class="btn-primary" id="addBtn">Add Transaction</button>
    </div>

    <!-- Bottom grid: Transactions + Chart -->
    <div class="bottom-grid">

      <!-- Transaction List -->
      <div class="card">
        <div class="card-title">Transactions</div>
        <div class="limit-banner" id="limitBanner"></div>
        <div class="transaction-list" id="txList"></div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="card-title">Spending by Category</div>
        <div class="chart-wrapper">
          <canvas id="spendChart"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
